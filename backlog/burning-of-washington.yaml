synopsis: |
  In the summer of 1814, the United States of America is two years into a war it was
  never prepared to fight. President James Madison, architect of the Constitution and
  the smallest man ever to occupy the presidency, holds the fractured republic together
  by sheer force of intellect and will. His Secretary of War, John Armstrong Jr., a
  decorated veteran of the Revolution and a man of towering self-regard, has spent
  two years managing the conflict with bureaucratic indifference and naked contempt
  for those he considers his inferiors — including Madison himself.

  The novel opens in June 1814, as Napoleon's defeat frees thousands of battle-hardened
  British regulars for deployment to North America. Intelligence reaches Washington that
  a British naval force under Rear Admiral George Cockburn and an army under Major
  General Robert Ross are staging in the Chesapeake Bay. Armstrong, convinced that
  Baltimore is the true British target and that Washington is strategically worthless,
  dismisses every warning. He refuses to fortify the capital, delays forming a coherent
  defense, and openly mocks those — including the city's own citizens — who raise the
  alarm. Madison, who lacks Armstrong's military experience and has long deferred to
  him on operational matters, grows increasingly alarmed but cannot bring himself to
  override his cabinet officer until it is catastrophically late.

  On August 19, 1814, Ross lands 4,500 British troops at Benedict, Maryland. Madison
  rides out personally to observe the American defensive preparations at Bladensburg,
  arriving on August 24 just as Brigadier General William Winder's untested militia
  collapses before the British advance in what history will call "the Bladensburg Races."
  Armstrong is also at Bladensburg; the two men barely speak. The road to Washington
  lies open. That evening, as Dolley Madison salvages state papers and Gilbert Stuart's
  portrait of George Washington from the White House, British troops march up Pennsylvania
  Avenue and set fire to the Capitol, the President's House, and the Navy Yard.

  Madison spends the night of August 24 as a fugitive in the Virginia countryside,
  receiving dispatches by horseback. Armstrong, unrepentant, attempts to resume his
  duties as if nothing has occurred. Within days, troops mutiny at his presence and
  militia officers threaten to resign rather than serve under him. On September 4, 1814,
  Madison summarily asks for Armstrong's resignation. Armstrong complies — and immediately
  embarks on a years-long public campaign to blame Madison, Winder, and the city itself
  for the disaster, absolving himself entirely.

  The novel closes in February 1815, as news of the Treaty of Ghent and Andrew Jackson's
  spectacular victory at New Orleans reaches a capital still smelling of smoke and fresh
  timber. Madison is vindicated in public opinion, the republic survives, and Armstrong
  retreats into bitter private life — each man carrying his own version of what happened
  and why. The question the novel refuses to answer cleanly is the one history cannot
  settle either: which failure was greater — the arrogance that left a capital undefended,
  or the deference that allowed the arrogance to stand?
additional_notes: |
  POV Characters:

  James Madison (President of the United States) — Madison's chapters render the war
  from the perspective of a man of ideas trapped inside a crisis of action. Small in
  stature, chronically ill, and constitutionally averse to the kind of forceful executive
  command the moment demands, Madison is not a coward — he rides toward Bladensburg
  under fire — but he is a consensus-builder in a situation that requires a dictator.
  His interiority is lawyerly, self-questioning, and profoundly aware of historical
  stakes. His marriage to Dolley provides warmth and tactical clarity he cannot always
  generate himself. His chapters carry the weight of the republic's symbolic meaning:
  the city that burns is his city, his Constitution made stone.

  John Armstrong Jr. (Secretary of War) — Armstrong's chapters are those of a man who
  has decided in advance that he is the most capable person in every room, and who
  interprets every failure as confirmation of everyone else's inadequacy. A veteran of
  Valley Forge and former U.S. Minister to France, Armstrong's experience is real but
  his judgment is corroded by ambition and contempt. His narrative voice is controlled,
  self-justifying, and occasionally brilliant — he is not stupid, which makes his
  failures more damning. His chapters track the slow, self-deceiving process by which
  a competent man constructs the logic of his own negligence.

  Key Supporting Figures: Dolley Madison, Rear Admiral George Cockburn, Major General
  Robert Ross, Brigadier General William Winder, Secretary of State James Monroe,
  Commodore Joshua Barney.

  Historical Sources to Honor: The Bladensburg defeat of August 24, 1814; Madison's
  own account in his memoranda; Armstrong's post-war pamphlet "Notices of the War of
  1812"; the British account of Ross and Cockburn; the survival of the Treaty of Ghent
  (signed December 24, 1814).

  Tone Note: The novel should resist the temptation to make Madison a simple hero and
  Armstrong a simple villain. Both men failed, in different registers and for different
  reasons. The dramatic engine is not good versus evil but institutional dysfunction
  under pressure — a theme with obvious resonance beyond 1814.
description: "Two men, one burning capital: President Madison and Secretary Armstrong each believe the other is responsible for the greatest military humiliation in American history."
